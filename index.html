<!DOCTYPE html>
<html lang="en" class="bg-black">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Things S5 | The Veil is Thin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'stranger': ['Creepster', 'cursive'],
                        'tech': ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        'netflix-red': '#E50914',
                        'neon-red': '#ff0000',
                    },
                    backgroundImage: {
                        // Image 1: The "Normal" World (Foggy, dark, but normal)
                        'normal-world': "url('AnalytixFest2K27/character.png')",
                        // Image 2: The "Upside Down" (Red, intense, revealed on hover)
                        'upside-down': "url('AnalytixFest2K27/veckna.png')",
                    }
                }
            }
        }
    </script>

    <style>
        body {
            overflow: hidden;
            cursor: crosshair;
            /* Better vibe for "aiming" the reveal */
        }

        /* LOADER ANIMATIONS */
        .loader-pulse {
            animation: text-flicker 3s linear infinite;
        }

        @keyframes text-flicker {

            0%,
            19.9%,
            22%,
            62.9%,
            64%,
            64.9%,
            70%,
            100% {
                opacity: 0.99;
                text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            }

            20%,
            21.9%,
            63%,
            63.9%,
            65%,
            69.9% {
                opacity: 0.4;
                text-shadow: none;
            }
        }

        /* CORE MECHANIC: The Airbrush Reveal Mask */
        #upside-down-layer {
            /* We use CSS custom properties that GSAP will animate for smooth performance */
            --clip-x: 50%;
            --clip-y: 50%;
            --clip-radius: 0px;
            /* Closed by default */

            /* The magic happens here: A circular mask positioned by the variables */
            clip-path: circle(var(--clip-radius) at var(--clip-x) var(--clip-y));
            will-change: clip-path, --clip-radius, --clip-x, --clip-y;

            /* Add a red glow to the edge of the reveal circle */
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.8));
        }

        /* GLITCH TEXT EFFECT */
        .glitch-text {
            position: relative;
            text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff,
                0.025em 0.04em 0 #fffc00;
            animation: glitch 725ms infinite;
        }

        @keyframes glitch {
            0% {
                text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00;
            }

            15% {
                text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00;
            }

            16% {
                text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00;
            }

            49% {
                text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00;
            }

            50% {
                text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00;
            }

            99% {
                text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00;
            }

            100% {
                text-shadow: -0.05em 0 0 #00fffc, -0.025em -0.04em 0 #fc00ff, -0.04em -0.025em 0 #fffc00;
            }
        }
    </style>
</head>

<body class="h-screen w-screen bg-black select-none">

    <div id="loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center">
        <h1 class="font-stranger text-4xl md:text-9xl text-netflix-red tracking-widest loader-pulse mb-4">STRANGER
            THINGS</h1>
        <div class="font-tech text-red-800 tracking-[0.5em] text-sm uppercase animate-pulse">Opening the rift...</div>
    </div>

    <main class="relative h-full w-full overflow-hidden">

        <div id="canvas-container" class="absolute inset-0 z-0 pointer-events-none"></div>

        <div id="normal-layer"
            class="absolute inset-0 z-10 bg-cover bg-center bg-no-repeat bg-normal-world grayscale-[30%] brightness-50">
        </div>

        <div id="upside-down-layer"
            class="absolute inset-0 z-20 bg-cover bg-center bg-no-repeat bg-upside-down contrast-125 brightness-110">
            <div class="absolute inset-0 bg-red-900/40 mix-blend-overlay"></div>
        </div>

        <div class="absolute inset-0 z-30  pointer-events-none px-4">
            <h2 id="s5-title"
                class="font-stranger text-6xl md:text-9xl text-netflix-red drop-shadow-[0_0_30px_rgba(255,0,0,0.8)] opacity-0 scale-110">
                SEASON 5</h2>
            <p id="s5-subtitle"
                class="font-tech text-white/80 text-lg md:text-2xl tracking-[0.3em] mt-4 opacity-0 uppercase">The final
                chapter begins</p>
           
        </div>

        <div
            class="absolute inset-0 z-40 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_20%,#000_130%)]">
        </div>
    </main>

    <script>
        // --- 1. THREE.JS PARTICLE SYSTEM SETUP ---
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            // Add fog to fade particles into the distance
            scene.fog = new THREE.FogExp2(0x000000, 0.0015);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 150;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Create red "spores"
            const particleCount = 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 500; // x
                positions[i * 3 + 1] = (Math.random() - 0.5) * 500; // y
                positions[i * 3 + 2] = (Math.random() - 0.5) * 500; // z
                velocities.push({
                    x: (Math.random() - 0.5) * 0.1,
                    y: (Math.random() * 0.2) + 0.1, // drifted upwards slightly
                    z: (Math.random() - 0.5) * 0.1
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                color: 0xff0000,
                size: 2,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending // Makes them glow when overlapping
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Animation Loop
            function animate() {
                requestAnimationFrame(animate);
                const posAttr = particles.geometry.attributes.position;

                for (let i = 0; i < particleCount; i++) {
                    posAttr.array[i * 3] += velocities[i].x;
                    posAttr.array[i * 3 + 1] += velocities[i].y;
                    posAttr.array[i * 3 + 2] += velocities[i].z;

                    // Reset particles if they go off screen to create endless loop
                    if (posAttr.array[i * 3 + 1] > 250) posAttr.array[i * 3 + 1] = -250;
                }
                posAttr.needsUpdate = true;
                particles.rotation.y += 0.001; // Slow rotation of whole system
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }


        // --- 2. CORE INTERACTION & ANIMATION SETUP ---
        function initInteractions() {
            const revealLayer = document.getElementById('upside-down-layer');
            const normalLayer = document.getElementById('normal-layer');

            // Mousemove handler for the "Airbrush" effect
            document.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX;
                const mouseY = e.clientY;

                // 1. Animate the clip-path mask position smoothly
                // We animate CSS variables for better performance than changing clip-path string directly
                gsap.to(revealLayer, {
                    '--clip-x': `${mouseX}px`,
                    '--clip-y': `${mouseY}px`,
                    duration: 0.4, // Adds inertia to the brush movement
                    ease: "power2.out"
                });

                // 2. Subtle parallax effect on the background layers for depth
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const moveX = (mouseX - centerX) / centerX;
                const moveY = (mouseY - centerY) / centerY;

                gsap.to(normalLayer, { x: moveX * -20, y: moveY * -10, duration: 1 });
                gsap.to(revealLayer, { x: moveX * -30, y: moveY * -15, duration: 1 });
            });

            // Mouse Down/Up - Expand the rift momentarily
            document.addEventListener('mousedown', () => {
                gsap.to(revealLayer, { '--clip-radius': '300px', duration: 0.3, ease: "back.out(1.7)" });
            });
            document.addEventListener('mouseup', () => {
                // Return to a base radius if moving, or close if static (handled by mousemove logic below)
                /* A small base radius when moving looks good */
            });

            // Logic to open the portal only when moving mouse, close when still
            let moveTimeout;
            document.addEventListener('mousemove', () => {
                clearTimeout(moveTimeout);
                gsap.to(revealLayer, { '--clip-radius': '180px', duration: 0.3 }); // Open portal on move

                moveTimeout = setTimeout(() => {
                    // Close portal if mouse stops moving for 1 second
                    gsap.to(revealLayer, { '--clip-radius': '0px', duration: 0.8, ease: "power3.in" });
                }, 1000);
            });
        }


        // --- 3. MAIN INITIALIZATION SEQUENCE ---
        window.addEventListener('load', () => {
            // A. Start Three.js immediately behind loader
            initThreeJS();

            const loader = document.getElementById('loader');
            const title = document.getElementById('s5-title');
            const subtitle = document.getElementById('s5-subtitle');
            const instruction = document.getElementById('instruction');

            // B. Intro Timeline
            const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

            tl.to(loader, {
                opacity: 0,
                duration: 1.5,
                delay: 2, // Fake loading time
                onComplete: () => loader.remove() // Remove from DOM
            })
                .to(title, { opacity: 1, scale: 1, duration: 2, ease: "elastic.out(1, 0.5)" }, "-=0.5")
                .to(subtitle, { opacity: 1, y: 0, duration: 1 }, "-=1")
                .to(instruction, { opacity: 1, duration: 1, onComplete: initInteractions }, "-=0.5"); // Init interactions after intro

            // C. Flicker effect on title entrance
            tl.fromTo(title, { textShadow: "0 0 0px rgba(255,0,0,0)" }, { textShadow: "0 0 50px rgba(255,0,0,0.9)", duration: 0.1, repeat: 5, yoyo: true }, "-=1.5");

        });
    </script>
</body>

</html>
